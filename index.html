<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌍 GLOBAL EYE - Universal Binary Vision</title>
    <style>
        /* ============================================================
           GLOBAL EYE STYLES
           ============================================================ */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            color: #00ff88;
            font-family: 'Courier New', monospace;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #00ff8844;
            padding-bottom: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .header h1 {
            font-size: 28px;
            color: #00ff88;
            text-shadow: 0 0 30px #00ff8844;
            letter-spacing: 3px;
        }
        .header .status {
            font-size: 14px;
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid #ffaa00;
            color: #ffaa00;
            background: #ffaa0022;
        }
        .header .status.online {
            border-color: #00ff88;
            color: #00ff88;
            background: #00ff8822;
        }
        .header .status.error {
            border-color: #ff3355;
            color: #ff3355;
            background: #ff335522;
        }
        
        /* API Config */
        .api-config {
            background: #1a1a24;
            border: 1px solid #00ff8833;
            border-radius: 8px;
            padding: 15px 20px;
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        .api-config label {
            color: #00ff8866;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .api-config input {
            background: #0a0a0f;
            border: 1px solid #00ff8833;
            color: #00ff88;
            padding: 8px 15px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            flex: 1;
            min-width: 200px;
        }
        .api-config input:focus {
            outline: none;
            border-color: #00ff88;
        }
        .api-config button {
            background: #00ff8822;
            border: 1px solid #00ff88;
            color: #00ff88;
            padding: 8px 25px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            transition: all 0.3s;
        }
        .api-config button:hover {
            background: #00ff8844;
            box-shadow: 0 0 20px #00ff8822;
        }
        .api-config button.danger {
            border-color: #ff3355;
            color: #ff3355;
            background: #ff335522;
        }
        .api-config button.danger:hover {
            background: #ff335544;
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: #1a1a24;
            border: 1px solid #00ff8833;
            border-radius: 8px;
            padding: 15px 20px;
            text-align: center;
        }
        .stat-card .label {
            font-size: 11px;
            text-transform: uppercase;
            color: #00ff8866;
            letter-spacing: 1px;
        }
        .stat-card .value {
            font-size: 28px;
            font-weight: bold;
            margin-top: 5px;
            color: #00ff88;
        }
        .stat-card .value.warning { color: #ffaa00; }
        .stat-card .value.danger { color: #ff3355; }
        
        /* Channels */
        .channels {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }
        .channel {
            background: #1a1a24;
            border: 1px solid #00ff8833;
            border-radius: 6px;
            padding: 12px 10px;
            text-align: center;
            transition: all 0.3s ease;
        }
        .channel.winner {
            border-color: #00ff88;
            background: #00ff8811;
            box-shadow: 0 0 20px #00ff8822;
        }
        .channel.loser {
            border-color: #ff335544;
            background: #ff335511;
        }
        .channel .ch-label {
            font-size: 10px;
            color: #00ff8866;
            text-transform: uppercase;
        }
        .channel .ch-value {
            font-size: 16px;
            font-weight: bold;
            margin: 4px 0;
        }
        .channel .ch-status { font-size: 18px; }
        .channel .ch-status.win { color: #00ff88; }
        .channel .ch-status.lose { color: #ff3355; }
        
        /* Binary Map */
        .binary-map {
            background: #1a1a24;
            border: 1px solid #00ff8833;
            border-radius: 8px;
            padding: 15px 20px;
            margin-bottom: 25px;
        }
        .binary-map .map-label {
            font-size: 11px;
            color: #00ff8866;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .binary-map .map-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .binary-map .bit {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
        }
        .binary-map .bit.on { background: #00ff88; color: #0a0a0f; }
        .binary-map .bit.off { background: #2a2a3a; color: #555; }
        
        /* Dominant */
        .dominant {
            background: #1a1a24;
            border: 1px solid #ffaa0044;
            border-radius: 8px;
            padding: 15px 20px;
            margin-bottom: 25px;
            text-align: center;
        }
        .dominant .dom-label {
            font-size: 11px;
            color: #ffaa0066;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .dominant .dom-value {
            font-size: 36px;
            font-weight: bold;
            color: #ffaa00;
            margin-top: 4px;
        }
        .dominant .dom-channel {
            font-size: 14px;
            color: #ffaa0088;
        }
        
        /* Raw Data Display */
        .raw-data {
            background: #1a1a24;
            border: 1px solid #00ff8833;
            border-radius: 8px;
            padding: 15px 20px;
            margin-bottom: 25px;
            max-height: 200px;
            overflow: auto;
        }
        .raw-data .raw-label {
            font-size: 11px;
            color: #00ff8866;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .raw-data pre {
            color: #00ff8866;
            font-size: 12px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        
        /* Footer */
        .footer {
            text-align: center;
            color: #00ff8833;
            font-size: 12px;
            padding: 20px 0;
            border-top: 1px solid #00ff8833;
        }
        
        /* Responsive */
        @media (max-width: 992px) { .channels { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .channels { grid-template-columns: repeat(3, 1fr); }
            .api-config { flex-direction: column; }
            .api-config input { width: 100%; }
        }
        @media (max-width: 480px) {
            .channels { grid-template-columns: repeat(2, 1fr); }
            .stats-grid { grid-template-columns: 1fr 1fr; }
        }
        
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px #00ff8822; }
            50% { box-shadow: 0 0 40px #00ff8855; }
        }
        .winner .ch-value { animation: glow 2s ease-in-out infinite; }
    </style>
</head>
<body>
    <div class="container">
        
        <!-- ============================================================
        HEADER
        ============================================================ -->
        <div class="header">
            <h1>🌍 GLOBAL EYE · Binary Vision</h1>
            <div class="status" id="statusBadge">● WAITING</div>
        </div>
        
        <!-- ============================================================
        API CONFIGURATION
        ============================================================ -->
        <div class="api-config">
            <label>🔗 API URL</label>
            <input type="text" id="apiUrl" placeholder="http://192.168.1.100/api/data" value="http://192.168.1.100/api/data">
            <button id="connectBtn">▶ CONNECT</button>
            <button id="simulateBtn" class="danger">🎲 SIMULATE</button>
            <button id="resetBtn" class="danger">✕ RESET</button>
        </div>
        
        <!-- ============================================================
        STATS
        ============================================================ -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="label">Winners</div>
                <div class="value" id="winnersCount">0/12</div>
            </div>
            <div class="stat-card">
                <div class="label">Selection Power</div>
                <div class="value" id="selectionPower">0%</div>
            </div>
            <div class="stat-card">
                <div class="label">Dominant</div>
                <div class="value" id="dominantChannel">-</div>
            </div>
            <div class="stat-card">
                <div class="label">Health</div>
                <div class="value" id="rigHealth">WAITING</div>
            </div>
        </div>
        
        <!-- ============================================================
        CHANNELS
        ============================================================ -->
        <div class="channels" id="channelsGrid"></div>
        
        <!-- ============================================================
        BINARY MAP
        ============================================================ -->
        <div class="binary-map">
            <div class="map-label">Binary Map · 1 = Winner · 0 = Loser</div>
            <div class="map-row" id="binaryMap"></div>
        </div>
        
        <!-- ============================================================
        DOMINANT
        ============================================================ -->
        <div class="dominant">
            <div class="dom-label">🏆 Dominant Channel</div>
            <div class="dom-value" id="dominantValue">--</div>
            <div class="dom-channel" id="dominantLabel">Channel --</div>
        </div>
        
        <!-- ============================================================
        RAW DATA
        ============================================================ -->
        <div class="raw-data">
            <div class="raw-label">📡 Raw API Response</div>
            <pre id="rawOutput">Waiting for data...</pre>
        </div>
        
        <!-- ============================================================
        FOOTER
        ============================================================ -->
        <div class="footer">
            GLOBAL EYE v2.0 · Universal Binary Vision · <span id="updateTime">--</span>
        </div>
        
    </div>
    
    <!-- ============================================================
    JAVASCRIPT - GLOBAL EYE ENGINE
    ============================================================ -->
    <script>
        // ============================================================
        // CONFIGURATION
        // ============================================================
        const NUM_CHANNELS = 12;
        const THRESHOLD = 2048;
        const CHANNEL_LABELS = ['GPU0','GPU1','GPU2','GPU3','PSU0','PSU1','PSU2','PSU3','TMP0','TMP1','TMP2','TMP3'];
        const CHANNEL_TYPES = ['gpu','gpu','gpu','gpu','psu','psu','psu','psu','tmp','tmp','tmp','tmp'];
        
        let updateInterval = null;
        let currentData = null;
        let updateCount = 0;
        let isConnected = false;
        let apiUrl = 'http://192.168.1.100/api/data';
        
        // ============================================================
        // DOM REFS
        // ============================================================
        const statusBadge = document.getElementById('statusBadge');
        const apiUrlInput = document.getElementById('apiUrl');
        const connectBtn = document.getElementById('connectBtn');
        const simulateBtn = document.getElementById('simulateBtn');
        const resetBtn = document.getElementById('resetBtn');
        const rawOutput = document.getElementById('rawOutput');
        const updateTime = document.getElementById('updateTime');
        
        // ============================================================
        // FETCH DATA FROM API
        // ============================================================
        async function fetchData(url) {
            try {
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json'
                    }
                });
                
                if(!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                return data;
            } catch(e) {
                throw e;
            }
        }
        
        // ============================================================
        // VALIDATE DATA
        // ============================================================
        function validateData(data) {
            if(!data) return false;
            if(!data.values || !Array.isArray(data.values)) return false;
            if(data.values.length !== NUM_CHANNELS) return false;
            return true;
        }
        
        // ============================================================
        // PROCESS BINARY LOGIC
        // ============================================================
        function processBinaryLogic(values) {
            const winners = [];
            for(let i = 0; i < values.length; i++) {
                if(i < 8) {
                    winners.push(values[i] > THRESHOLD);
                } else {
                    winners.push(values[i] < THRESHOLD);
                }
            }
            return winners;
        }
        
        // ============================================================
        // FIND DOMINANT
        // ============================================================
        function findDominant(values) {
            let maxIdx = 0, maxVal = values[0], minVal = values[0];
            for(let i = 1; i < values.length; i++) {
                if(values[i] > maxVal) { maxVal = values[i]; maxIdx = i; }
                if(values[i] < minVal) minVal = values[i];
            }
            return { index: maxIdx, value: maxVal, min: minVal, spread: maxVal - minVal };
        }
        
        // ============================================================
        // UPDATE DASHBOARD
        // ============================================================
        function updateDashboard(data) {
            const values = data.values;
            const winners = data.winners || processBinaryLogic(values);
            const winnerCount = winners.filter(w => w).length;
            const selectionRatio = (winnerCount / NUM_CHANNELS * 100);
            const isHealthy = winnerCount > (NUM_CHANNELS / 2);
            const dominant = findDominant(values);
            
            // Stats
            document.getElementById('winnersCount').textContent = `${winnerCount}/${NUM_CHANNELS}`;
            document.getElementById('winnersCount').className = `value ${winnerCount < 4 ? 'danger' : winnerCount < 6 ? 'warning' : ''}`;
            document.getElementById('selectionPower').textContent = `${selectionRatio.toFixed(1)}%`;
            document.getElementById('selectionPower').className = `value ${selectionRatio < 40 ? 'danger' : selectionRatio < 55 ? 'warning' : ''}`;
            document.getElementById('dominantChannel').textContent = CHANNEL_LABELS[dominant.index];
            document.getElementById('rigHealth').textContent = isHealthy ? '✅ OPTIMAL' : '⚠️ WARNING';
            document.getElementById('rigHealth').className = `value ${isHealthy ? '' : 'danger'}`;
            
            // Channels
            const grid = document.getElementById('channelsGrid');
            grid.innerHTML = '';
            for(let i = 0; i < NUM_CHANNELS; i++) {
                const div = document.createElement('div');
                div.className = `channel ${winners[i] ? 'winner' : 'loser'}`;
                div.innerHTML = `
                    <div class="ch-label">${CHANNEL_LABELS[i]}</div>
                    <div class="ch-value">${values[i]}</div>
                    <div class="ch-status ${winners[i] ? 'win' : 'lose'}">${winners[i] ? '▼ WIN' : '▲ LOSE'}</div>
                `;
                grid.appendChild(div);
            }
            
            // Binary Map
            const map = document.getElementById('binaryMap');
            map.innerHTML = '';
            for(let i = 0; i < NUM_CHANNELS; i++) {
                const bit = document.createElement('div');
                bit.className = `bit ${winners[i] ? 'on' : 'off'}`;
                bit.textContent = winners[i] ? '1' : '0';
                map.appendChild(bit);
            }
            
            // Dominant
            document.getElementById('dominantValue').textContent = dominant.value;
            document.getElementById('dominantLabel').textContent = `Channel ${dominant.index} · ${CHANNEL_LABELS[dominant.index]}`;
            
            // Update time
            updateTime.textContent = new Date().toLocaleTimeString();
            
            // Update count
            updateCount++;
        }
        
        // ============================================================
        // CONNECT TO API
        // ============================================================
        async function connectToAPI(url) {
            statusBadge.textContent = '● CONNECTING...';
            statusBadge.className = 'status';
            rawOutput.textContent = 'Connecting to ' + url + '...';
            
            try {
                const data = await fetchData(url);
                
                if(validateData(data)) {
                    // Process data
                    data.winners = data.winners || processBinaryLogic(data.values);
                    currentData = data;
                    isConnected = true;
                    
                    // Update dashboard
                    updateDashboard(data);
                    
                    // Show raw data
                    rawOutput.textContent = JSON.stringify(data, null, 2);
                    
                    // Status
                    statusBadge.textContent = '● CONNECTED';
                    statusBadge.className = 'status online';
                    
                    // Start auto-update
                    if(updateInterval) clearInterval(updateInterval);
                    updateInterval = setInterval(async () => {
                        try {
                            const newData = await fetchData(url);
                            if(validateData(newData)) {
                                newData.winners = newData.winners || processBinaryLogic(newData.values);
                                currentData = newData;
                                updateDashboard(newData);
                                rawOutput.textContent = JSON.stringify(newData, null, 2);
                            }
                        } catch(e) {
                            // Keep showing last data
                        }
                    }, 2000);
                    
                    return true;
                } else {
                    throw new Error('Invalid data format');
                }
            } catch(e) {
                statusBadge.textContent = '● ERROR';
                statusBadge.className = 'status error';
                rawOutput.textContent = `❌ Error: ${e.message}\n\nTrying to connect to: ${url}\n\nMake sure:\n1. ESP32 is powered on\n2. ESP32 is on the same network\n3. URL is correct\n4. CORS is enabled`;
                isConnected = false;
                return false;
            }
        }
        
        // ============================================================
        // GENERATE SIMULATED DATA
        // ============================================================
        function generateSimulatedData() {
            const values = [];
            for(let i = 0; i < NUM_CHANNELS; i++) {
                if(i < 4) values.push(Math.floor(1500 + Math.random() * 2000));
                else if(i < 8) values.push(Math.floor(1800 + Math.random() * 1400));
                else values.push(Math.floor(800 + Math.random() * 2200));
            }
            
            // Force pattern
            values[0] = 3162 + Math.floor(Math.random() * 50);
            values[1] = 2880 + Math.floor(Math.random() * 50);
            values[2] = 1244 + Math.floor(Math.random() * 50);
            values[3] = 2919 + Math.floor(Math.random() * 50);
            values[4] = 1761 + Math.floor(Math.random() * 50);
            values[5] = 3188 + Math.floor(Math.random() * 50);
            values[6] = 2285 + Math.floor(Math.random() * 50);
            values[7] = 1340 + Math.floor(Math.random() * 50);
            values[8] = 914 + Math.floor(Math.random() * 50);
            values[9] = 2735 + Math.floor(Math.random() * 50);
            values[10] = 1030 + Math.floor(Math.random() * 50);
            values[11] = 2472 + Math.floor(Math.random() * 50);
            
            const winners = processBinaryLogic(values);
            const data = {
                values: values,
                winners: winners,
                hashrate: 12000 + Math.random() * 8000,
                accepted: Math.floor(Math.random() * 10),
                rejected: Math.floor(Math.random() * 5),
                difficulty: 120000 + Math.random() * 30000,
                poolStatus: 'Simulated',
                source: 'simulated'
            };
            
            return data;
        }
        
        // ============================================================
        // START SIMULATION
        // ============================================================
        function startSimulation() {
            if(updateInterval) clearInterval(updateInterval);
            
            statusBadge.textContent = '● SIMULATED';
            statusBadge.className = 'status';
            
            const data = generateSimulatedData();
            currentData = data;
            isConnected = false;
            updateDashboard(data);
            rawOutput.textContent = JSON.stringify({...data, source: 'SIMULATED - Random numbers'}, null, 2);
            
            updateInterval = setInterval(() => {
                const newData = generateSimulatedData();
                currentData = newData;
                updateDashboard(newData);
                rawOutput.textContent = JSON.stringify({...newData, source: 'SIMULATED - Random numbers'}, null, 2);
            }, 2000);
        }
        
        // ============================================================
        // RESET
        // ============================================================
        function resetAll() {
            if(updateInterval) clearInterval(updateInterval);
            isConnected = false;
            statusBadge.textContent = '● WAITING';
            statusBadge.className = 'status';
            rawOutput.textContent = 'Waiting for data...';
            currentData = null;
            updateCount = 0;
            
            // Reset dashboard
            document.getElementById('winnersCount').textContent = '0/12';
            document.getElementById('winnersCount').className = 'value';
            document.getElementById('selectionPower').textContent = '0%';
            document.getElementById('selectionPower').className = 'value';
            document.getElementById('dominantChannel').textContent = '-';
            document.getElementById('rigHealth').textContent = 'WAITING';
            document.getElementById('rigHealth').className = 'value';
            document.getElementById('channelsGrid').innerHTML = '';
            document.getElementById('binaryMap').innerHTML = '';
            document.getElementById('dominantValue').textContent = '--';
            document.getElementById('dominantLabel').textContent = 'Channel --';
            updateTime.textContent = '--';
        }
        
        // ============================================================
        // EVENT LISTENERS
        // ============================================================
        connectBtn.addEventListener('click', () => {
            const url = apiUrlInput.value.trim();
            if(url) {
                apiUrl = url;
                connectToAPI(url);
            } else {
                rawOutput.textContent = '❌ Please enter an API URL';
            }
        });
        
        simulateBtn.addEventListener('click', startSimulation);
        
        resetBtn.addEventListener('click', resetAll);
        
        // Enter key on input
        apiUrlInput.addEventListener('keydown', (e) => {
            if(e.key === 'Enter') {
                connectBtn.click();
            }
        });
        
        // ============================================================
        // AUTO-START ON LOAD
        // ============================================================
        window.addEventListener('load', () => {
            // Try to connect to saved URL
            const savedUrl = localStorage.getItem('globalEyeUrl');
            if(savedUrl) {
                apiUrlInput.value = savedUrl;
                setTimeout(() => connectToAPI(savedUrl), 500);
            } else {
                // Start with simulation
                setTimeout(startSimulation, 500);
            }
        });
        
        // Save URL on connect
        connectBtn.addEventListener('click', () => {
            localStorage.setItem('globalEyeUrl', apiUrlInput.value.trim());
        });
        
        console.log('🌍 GLOBAL EYE v2.0');
        console.log('Channels: ' + NUM_CHANNELS);
        console.log('Threshold: ' + THRESHOLD);
        console.log('URL: ' + apiUrl);
        console.log('==============================');
    </script>
</body>
</html>
